version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ocm-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - ocm-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go backend (original) ─────────────────────────────────────────────────
  # Start with: docker compose up  (default)
  # or:         docker compose --profile go up
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocm-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ocm-network
    profiles:
      - go

  # ── Java backend (Spring Boot) ────────────────────────────────────────────
  # Start with: docker compose --profile java up
  backend-java:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: ocm-backend-java
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ocm-network
    profiles:
      - java

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ocm-frontend
    restart: unless-stopped
    # No depends_on backend here — nginx retries are sufficient
    networks:
      - ocm-network
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

  # ── Nginx → Go backend ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ocm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - ocm-network
    profiles:
      - go

  # ── Nginx → Java backend ──────────────────────────────────────────────────
  nginx-java:
    image: nginx:alpine
    container_name: ocm-nginx-java
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-java.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - ocm-network
    profiles:
      - java

volumes:
  pgdata:


networks:
  ocm-network:
    driver: bridge

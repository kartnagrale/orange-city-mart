# Server
server.port=${PORT:8080}

# DataSource – reads the same DATABASE_URL the Go backend uses
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/orange_city_mart}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:ocm}
spring.datasource.password=${POSTGRES_PASSWORD:ocm_secret}

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JWT secret (same env var as Go)
app.jwt.secret=${JWT_SECRET:change_this_to_a_long_random_string_in_production}
app.jwt.expiry-hours=24

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# Frontend URL (for CORS, same as Go)
app.frontend-url=${FRONTEND_URL:}

# Logging
logging.level.com.ocm=INFO
